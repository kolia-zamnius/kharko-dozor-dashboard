# Optional always-on Postgres for devs who want to inspect tests via psql/GUI.
# `npm test` doesn't use this — Testcontainers spins up its own per-run.
# Image pinned to the Testcontainers version so CI debugging matches.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    tmpfs:
      # Data in RAM — faster, no leftover bytes after reboot.
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 2s
      timeout: 3s
      retries: 15
